name: Java CI with Gradle

# どんな時に動かすか（mainブランチにPushされた時）
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # GitHubが用意してくれる仮想マシン（Ubuntu Linux）
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # あなたのコードを仮想マシンにコピー

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # ここでもTemurinを使います！

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # Gradleを使えるように準備

    - name: Build with Gradle
      run: ./gradlew build # 実際にビルドとテストを実行！