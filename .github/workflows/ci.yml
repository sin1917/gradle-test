name: Java CI/CD with Docker and GHCR

on:
  push:
    branches: [ "main" ]

# GitHubの倉庫(GHCR)への書き込み権限
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 【CIフェーズ】 ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # ビルドを速くするためのキャッシュ設定

      - name: Run Tests
        run: ./gradlew test

      # --- 【CDフェーズ】 テスト成功時のみ、コンテナ化して倉庫へ送る ---
      - name: Log in to GitHub Container Registry
        if: success() # テストが成功した時だけ実行
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # あなたのGitHubユーザー名/リポジトリ名のイメージが作成されます
          tags: ghcr.io/${{ github.repository }}:latest